<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR受付システム</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; margin: 0; background: #f0f0f0; }
        #canvas { width: 100%; max-width: 400px; border: 2px solid #333; margin-top: 10px; border-radius: 8px; }
        #result { margin-top: 20px; padding: 15px; font-size: 1.2em; font-weight: bold; min-height: 60px; white-space: pre-wrap; }
        .success { background: #d4edda; color: #155724; border: 2px solid #28a745; }
        .error { background: #f8d7da; color: #721c24; border: 2px solid #dc3545; }
        .loading { color: #666; }
        #overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:flex; justify-content:center; align-items:center; color:white; z-index:100; cursor:pointer; }
    </style>
</head>
<body>
    <div id="overlay" onclick="startApp()">タップしてカメラを開始</div>

    <h1>受付スキャン</h1>
    <video id="video" style="display:none"></video>
    <canvas id="canvas"></canvas>
    <div id="result">QRコードをスキャンしてください</div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwwkE2u6CR7B1SP2aw4ZcFYyCTMYiIbZWEdZGhvSNT-0TSNb3N-W-BMwv_vdy0j7ncp9Q/exec";
        
        // 音源の定義（Web Audio APIを使わず、手軽なAudioオブジェクト）
        const soundSuccess = new Audio('https://otologic.jp/free/se/bin/level-up1.mp3'); // 成功音
        const soundError = new Audio('https://otologic.jp/free/se/bin/error1.mp3');     // 失敗音

        const video = document.getElementById("video");
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        const resultDiv = document.getElementById("result");
        let isProcessing = false;

        function startApp() {
            document.getElementById("overlay").style.display = "none";
            // 音源をプリロード（iOS対策）
            soundSuccess.load();
            soundError.load();
            
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(stream => {
                video.srcObject = stream;
                video.setAttribute("playsinline", true);
                video.play();
                requestAnimationFrame(tick);
            });
        }

        function tick() {
            if (video.readyState === video.HAVE_ENOUGH_DATA && !isProcessing) {
                canvas.height = video.videoHeight;
                canvas.width = video.videoWidth;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const code = jsQR(imageData.data, imageData.width, imageData.height);

                if (code) {
                    sendToGas(code.data);
                }
            }
            requestAnimationFrame(tick);
        }

async function sendToGas(qrData) {
    isProcessing = true;
    resultDiv.className = "loading";
    // ★読み取ったコードデータを表示するように変更
    resultDiv.innerText = `コード: ${qrData}\n照会中...`;
    
    try {
        const response = await fetch(GAS_URL, {
            method: "POST",
            body: JSON.stringify({ qrData: qrData })
        });
        const res = await response.json();
        
        resultDiv.className = res.status;
        if (res.status === "success") {
            soundSuccess.play();
            // ★成功時もコードデータを残す場合はここに追記
            resultDiv.innerText = `【${res.userName}様】\n${res.message}\n(Data: ${qrData})`;
        } else {
            soundError.play();
            resultDiv.innerText = `${res.message}\n(Data: ${qrData})`;
        }
        
        setTimeout(() => {
            isProcessing = false;
            resultDiv.innerText = "次のQRコードをスキャンしてください";
            resultDiv.className = "";
        }, 3000);
    } catch (e) {
        soundError.play();
        resultDiv.innerText = `通信エラーが発生しました\n(Data: ${qrData})`;
        isProcessing = false;
    }
}
    </script>
</body>
</html>
