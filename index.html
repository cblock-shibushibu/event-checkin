<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QRコード受付システム</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; margin: 0; background: #f0f0f0; }
        #canvas { width: 100%; max-width: 400px; border: 2px solid #333; }
        #result { margin-top: 20px; padding: 15px; font-weight: bold; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>QRコードスキャナー</h1>
    <video id="video" style="display:none"></video>
    <canvas id="canvas"></canvas>
    <div id="result">QRコードをかざしてください</div>

    <script>
        // ★ここにGASのデプロイURLを貼り付けてください
        const GAS_URL = "YOUR_GAS_WEB_APP_URL_HERE";

        const video = document.getElementById("video");
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        const resultDiv = document.getElementById("result");

        let isProcessing = false;

        // カメラ起動
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(stream => {
                video.srcObject = stream;
                video.setAttribute("playsinline", true);
                video.play();
                requestAnimationFrame(tick);
            });

        function tick() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.height = video.videoHeight;
                canvas.width = video.videoWidth;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const code = jsQR(imageData.data, imageData.width, imageData.height);

                if (code && !isProcessing) {
                    sendToGas(code.data);
                }
            }
            requestAnimationFrame(tick);
        }

        async function sendToGas(qrData) {
            isProcessing = true;
            resultDiv.innerText = "照会中...";
            
            try {
                const response = await fetch(GAS_URL, {
                    method: "POST",
                    body: JSON.stringify({ qrData: qrData })
                });
                const res = await response.json();
                
                resultDiv.className = res.status;
                resultDiv.innerText = `${res.message}\n${res.userName || ""}`;
                
                // 3秒後に再読み込み可能にする
                setTimeout(() => {
                    isProcessing = false;
                    resultDiv.innerText = "次のQRコードをかざしてください";
                    resultDiv.className = "";
                }, 3000);
            } catch (e) {
                resultDiv.innerText = "通信エラーが発生しました";
                isProcessing = false;
            }
        }
    </script>
</body>
</html>
